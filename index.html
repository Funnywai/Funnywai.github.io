
<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLACK Award 2025 - Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
            cursor: pointer;
            height: 100vh;
            width: 100vw;
        }
        
        .landing-container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        
        .background-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('flack.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
        }
        
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        
        .title {
            color: white;
            font-size: 4rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5),
                         0 0 20px rgba(255, 0, 255, 0.7),
                         0 0 30px rgba(255, 0, 255, 0.5);
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        .subtitle {
            color: white;
            font-size: 1.8rem;
            margin-bottom: 30px;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }
        
        .countdown-container {
            background: rgba(0, 0, 0, 0.7);
            padding: 30px;
            border-radius: 15px;
            margin: 30px 0;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
        }
        
        .countdown-title {
            color: white;
            font-size: 1.5rem;
            margin-bottom: 20px;
            font-weight: bold;
        }
        
        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .countdown-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .countdown-value {
            font-size: 3rem;
            font-weight: bold;
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
            min-width: 80px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .countdown-label {
            color: white;
            font-size: 1rem;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .message {
            color: white;
            font-size: 1.5rem;
            background: rgba(255, 0, 255, 0.3);
            padding: 15px 30px;
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            margin-top: 20px;
            transition: all 0.3s ease;
        }
        
        .message.voting-open {
            background: rgba(0, 255, 0, 0.3);
            animation: pulse 2s infinite;
            cursor: pointer;
        }
        
        .icon {
            font-size: 3rem;
            color: white;
            margin-top: 20px;
            animation: bounce 1s infinite alternate;
        }
        
        @keyframes glow {
            from {
                text-shadow: 0 0 20px rgba(255, 0, 25, 0.7),
                             0 0 30px rgba(255, 0, 25, 0.5);
            }
            to {
                text-shadow: 0 0 25px rgba(255, 0, 25, 0.9),
                             0 0 35px rgba(255, 0, 25, 0.7),
                             0 0 45px rgba(255, 0, 25, 0.6);
            }
        }
        
        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(0, 255, 0, 0.7);
            }
            70% {
                transform: scale(1.05);
                box-shadow: 0 0 0 10px rgba(0, 255, 0, 0);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(0, 255, 0, 0);
            }
        }
        
        @keyframes bounce {
            from {
                transform: translateY(0);
            }
            to {
                transform: translateY(-10px);
            }
        }
        
        /* Mobile responsive */
        @media (max-width: 768px) {
            .title {
                font-size: 2.5rem;
            }
            
            .subtitle {
                font-size: 1.2rem;
            }
            
            .countdown-value {
                font-size: 2rem;
                min-width: 60px;
            }
            
            .countdown-label {
                font-size: 0.8rem;
            }
            
            .message {
                font-size: 1.2rem;
                padding: 12px 24px;
            }
            
            .icon {
                font-size: 2rem;
            }
            
            .countdown {
                gap: 10px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="landing-container">
        <div class="background-image"></div>
        <div class="overlay">
            <h1 class="title">FLACK Award 2025</h1>
            <p class="subtitle">The Ultimate Recognition Event</p>
            
            <div class="countdown-container">
                <div class="countdown-title">Voting Opens In:</div>
                <div class="countdown">
                    <div class="countdown-item">
                        <div class="countdown-value" id="days">00</div>
                        <div class="countdown-label">Days</div>
                    </div>
                    <div class="countdown-item">
                        <div class="countdown-value" id="hours">00</div>
                        <div class="countdown-label">Hours</div>
                    </div>
                    <div class="countdown-item">
                        <div class="countdown-value" id="minutes">00</div>
                        <div class="countdown-label">Minutes</div>
                    </div>
                    <div class="countdown-item">
                        <div class="countdown-value" id="seconds">00</div>
                        <div class="countdown-label">Seconds</div>
                    </div>
                </div>
            </div>
            
            <div class="message" id="status-message">
                Please wait for the voting to open...
            </div>
            
            <div class="icon" id="status-icon">
                <i class="bi bi-clock"></i>
            </div>
            <footer style="color: aliceblue; margin-top: 30px;">
                <p>© 2025 FLACK Award. Voting opens on 24/12 21:00</p>
            </footer>
        </div>
    </div>
    
    <script>
        // Set the target date and time: 24th December 2025, 21:00 (9:00 PM)
        const targetDate = new Date('December 24, 2025 21:00:00').getTime();
        
        // Function to update countdown
        function updateCountdown() {
            const now = new Date().getTime();
            const timeRemaining = targetDate - now;
            
            if (timeRemaining <= 0) {
                // Voting is open!
                document.getElementById('days').innerText = '00';
                document.getElementById('hours').innerText = '00';
                document.getElementById('minutes').innerText = '00';
                document.getElementById('seconds').innerText = '00';
                
                document.getElementById('status-message').innerText = '🎉 Voting is now OPEN! Click to Enter 🎉';
                document.getElementById('status-message').classList.add('voting-open');
                document.getElementById('status-icon').innerHTML = '<i class="bi bi-chevron-double-down"></i>';
                
                // Remove the interval
                clearInterval(countdownInterval);
                
                // Enable click to redirect
                document.addEventListener('click', redirectToVoting);
                document.addEventListener('keydown', redirectToVoting);
                
                return;
            }
            
            // Calculate time units
            const days = Math.floor(timeRemaining / (1000 * 60 * 60 * 24));
            const hours = Math.floor((timeRemaining % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((timeRemaining % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeRemaining % (1000 * 60)) / 1000);
            
            // Update display
            document.getElementById('days').innerText = days.toString().padStart(2, '0');
            document.getElementById('hours').innerText = hours.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = minutes.toString().padStart(2, '0');
            document.getElementById('seconds').innerText = seconds.toString().padStart(2, '0');
        }
        
        // Function to redirect to voting page
        function redirectToVoting() {
            // Add a fade-out effect
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.5s ease';
            
            // Redirect after fade effect
            setTimeout(function() {
                window.location.href = 'voting.html';
            }, 500);
        }
        
        // Initial update
        updateCountdown();
        
        // Update countdown every second
        const countdownInterval = setInterval(updateCountdown, 1000);
        
        // Disable clicks until voting opens
        document.addEventListener('click', function(event) {
            const now = new Date().getTime();
            if (now < targetDate) {
                // Show a message that voting hasn't opened yet
                const message = document.getElementById('status-message');
                const originalText = message.innerText;
                message.innerText = 'Voting will open soon! Please wait...';
                message.style.background = 'rgba(255, 0, 0, 0.3)';
                
                setTimeout(() => {
                    message.innerText = originalText;
                    message.style.background = '';
                }, 1000);
            }
        });
        
        // Also check on page load and redirect immediately if time has passed
        window.onload = function() {
            const now = new Date().getTime();
            if (now >= targetDate) {
                // Redirect immediately if voting is open
                redirectToVoting();
            }
        };
    </script>
</body>
</html>
